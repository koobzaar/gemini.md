name: Release Firefox Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release-firefox:
    name: Build and submit to AMO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        shell: bash
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          expected_tag="v${manifest_version}"

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match manifest.json version ${manifest_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Lint extension
        run: npm run lint:amo

      - name: Build dist artifact
        run: npm run build:dist

      - name: Upload unsigned dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-md-firefox-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Check AMO credentials
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        shell: bash
        run: |
          if [ -z "${AMO_API_KEY}" ] || [ -z "${AMO_API_SECRET}" ]; then
            echo "AMO_API_KEY and AMO_API_SECRET repository secrets are required."
            exit 1
          fi

      - name: Submit listed version to Mozilla Add-ons
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: npm run sign:amo -- --api-key "$AMO_API_KEY" --api-secret "$AMO_API_SECRET"
